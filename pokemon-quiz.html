<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>포켓몬 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E3350D;--yellow:#FFCB05;--blue:#3D7DCA;
  --dark:#0d1117;--mid:#161b22;--card:#1c2333;
  --white:#e6edf3;--green:#2ea043;--pink:#ff7eb3;
  --border:rgba(255,255,255,.1);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Nanum Gothic',sans-serif;
  background:var(--dark);color:var(--white);
  min-height:100vh;min-height:-webkit-fill-available;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 10%,rgba(61,125,202,.12) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%,rgba(227,53,13,.08) 0%,transparent 60%);
  padding-bottom:calc(16px + var(--safe-bottom));
}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle 3s infinite alternate;}
@keyframes twinkle{from{opacity:.1}to{opacity:.5}}

/* Header */
header{position:relative;z-index:10;text-align:center;padding:16px 16px 6px;}
.logo{
  font-family:'Jua',cursive;font-size:clamp(1.6rem,5vw,2.6rem);
  background:linear-gradient(135deg,var(--yellow) 0%,#ff9900 50%,var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px rgba(255,203,5,.3));letter-spacing:2px;
}
.pokeball-ico{
  display:inline-block;width:22px;height:22px;vertical-align:middle;margin:0 5px;
  background:linear-gradient(to bottom,var(--red) 50%,white 50%);
  border-radius:50%;border:3px solid #444;position:relative;
}
.pokeball-ico::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;background:white;border-radius:50%;border:3px solid #444;}

/* Stats */
.stats-bar{position:relative;z-index:10;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:6px 12px;}
.chip{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:50px;padding:6px 14px;font-family:'Jua',cursive;font-size:.95rem;display:flex;align-items:center;gap:4px;}
.chip.score{border-color:rgba(255,203,5,.4);color:var(--yellow);}
.chip.timer{border-color:rgba(61,125,202,.4);color:#7ab8ff;}
.chip.streak{border-color:rgba(255,126,179,.4);color:var(--pink);}
#timer-val{font-size:1.1rem;transition:color .3s;min-width:28px;text-align:center;}
#timer-val.urgent{color:var(--red)!important;animation:blink .5s infinite alternate;}
@keyframes blink{to{transform:scale(1.2);}}

/* Game area */
.game-area{position:relative;z-index:10;max-width:640px;margin:0 auto;padding:6px 12px 20px;}
.gen-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.gen-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:rgba(255,255,255,.5);border-radius:50px;padding:5px 13px;font-family:'Jua',cursive;font-size:.8rem;cursor:pointer;transition:all .2s;touch-action:manipulation;-webkit-appearance:none;}
.gen-btn.active{background:var(--blue);border-color:var(--blue);color:white;}

/* Card */
.poke-card{background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.02));border:1px solid var(--border);border-radius:24px;padding:18px 16px 16px;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);position:relative;overflow:hidden;}
.poke-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,203,5,.04),transparent 65%);pointer-events:none;}
.poke-num{font-family:'Jua',cursive;color:rgba(255,255,255,.2);font-size:.85rem;text-align:center;margin-bottom:4px;}

/* Image */
.img-wrap{width:160px;height:160px;margin:0 auto 10px;}
.poke-img{width:160px;height:160px;object-fit:contain;filter:drop-shadow(0 8px 20px rgba(0,0,0,.4));}
.loading-wrap{width:160px;height:160px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.pokeball-spin{width:48px;height:48px;background:linear-gradient(to bottom,var(--red) 50%,white 50%);border-radius:50%;border:4px solid #444;position:relative;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.pokeball-spin::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;background:white;border-radius:50%;border:4px solid #444;}

/* Hint panel */
.hint-panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 14px;margin-bottom:10px;text-align:left;}
.hint-panel:empty{background:none;border-color:transparent;padding:0;margin-bottom:4px;}
.hint-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;animation:slideIn .3s cubic-bezier(.34,1.56,.64,1);}
.hint-row:last-child{margin-bottom:0;}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.hint-icon{font-size:1.1rem;flex-shrink:0;}
.hint-text{font-size:.9rem;line-height:1.5;color:rgba(255,255,255,.85);}
.hint-text strong{color:var(--yellow);}
.hint-text em{color:rgba(255,255,255,.6);font-style:normal;}
.type-badge{display:inline-block;padding:2px 8px;border-radius:50px;font-size:.75rem;font-weight:800;color:white;margin:2px 2px 2px 0;}

/* ── PHASE 1: Drawing canvas ── */
.phase-draw{display:block;}
.phase-choice{display:none;}

.draw-label{font-family:'Jua',cursive;font-size:1rem;color:rgba(255,255,255,.6);text-align:center;margin-bottom:8px;}

.canvas-tools{display:flex;gap:7px;margin-bottom:8px;align-items:center;flex-wrap:wrap;}
.tool-btn{font-family:'Jua',cursive;font-size:.8rem;border:1.5px solid var(--border);border-radius:10px;padding:6px 12px;cursor:pointer;background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);touch-action:manipulation;-webkit-appearance:none;transition:all .15s;}
.tool-btn:active{transform:scale(.95);}
.tool-btn.erase-on{color:var(--pink);border-color:rgba(255,126,179,.5);background:rgba(255,126,179,.1);}
.pen-size{display:flex;align-items:center;gap:5px;font-size:.8rem;color:rgba(255,255,255,.45);margin-left:auto;}
.pen-size input{width:60px;accent-color:var(--blue);}

.canvas-wrap{
  border:2.5px solid rgba(255,255,255,.15);border-radius:14px;
  overflow:hidden;background:white;margin-bottom:10px;
  touch-action:none;position:relative;
}
#draw-canvas{display:block;width:100%;cursor:crosshair;}

.canvas-guide{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Jua',cursive;font-size:1.1rem;color:rgba(0,0,0,.18);
  pointer-events:none;transition:opacity .3s;
}

.btn-confirm{
  width:100%;background:linear-gradient(135deg,var(--yellow),#ff9900);
  color:#1a1100;font-family:'Jua',cursive;font-size:1.1rem;
  border:none;border-radius:14px;padding:14px;
  cursor:pointer;box-shadow:0 4px 20px rgba(255,203,5,.3);
  touch-action:manipulation;-webkit-appearance:none;transition:all .15s;
  letter-spacing:1px;
}
.btn-confirm:active{transform:scale(.97);}

/* ── PHASE 2: Multiple choice ── */
.written-preview{
  text-align:center;margin-bottom:12px;
  font-family:'Jua',cursive;font-size:.9rem;color:rgba(255,255,255,.4);
}
.written-img{
  display:block;max-width:180px;height:60px;object-fit:contain;
  margin:0 auto 4px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:white;
}

.choice-label{
  font-family:'Jua',cursive;font-size:1rem;
  color:rgba(255,255,255,.7);text-align:center;margin-bottom:10px;
}
.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.choice-btn{
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);
  border-radius:14px;padding:14px 8px;
  font-family:'Jua',cursive;font-size:1rem;color:var(--white);
  cursor:pointer;touch-action:manipulation;-webkit-appearance:none;
  transition:all .2s;text-align:center;
}
.choice-btn:active{transform:scale(.96);}
.choice-btn.correct{background:rgba(46,160,67,.2);border-color:var(--green);color:var(--green);}
.choice-btn.wrong{background:rgba(227,53,13,.15);border-color:var(--red);color:var(--red);}
.choice-btn.reveal{background:rgba(46,160,67,.1);border-color:rgba(46,160,67,.4);color:var(--green);}

.btn-retry{
  width:100%;background:rgba(255,255,255,.07);border:1.5px solid var(--border);
  color:rgba(255,255,255,.6);font-family:'Jua',cursive;font-size:.95rem;
  border-radius:14px;padding:11px;cursor:pointer;
  touch-action:manipulation;-webkit-appearance:none;transition:all .15s;
  margin-bottom:8px;
}
.btn-retry:active{transform:scale(.97);}

/* Controls row */
.controls-row{display:flex;gap:8px;margin-bottom:10px;}
.btn{font-family:'Jua',cursive;border:none;border-radius:14px;padding:11px 10px;font-size:.88rem;cursor:pointer;transition:all .15s;flex:1;touch-action:manipulation;-webkit-appearance:none;}
.btn:active{transform:scale(.96);}
.btn-hint{background:rgba(255,203,5,.1);border:1px solid rgba(255,203,5,.4);color:var(--yellow);}
.btn-skip{background:rgba(255,255,255,.07);border:1px solid var(--border);color:rgba(255,255,255,.6);}

/* Status */
.status-msg{font-size:.88rem;color:rgba(255,255,255,.4);min-height:20px;text-align:center;margin-bottom:8px;transition:all .25s;}
.status-msg.correct{color:var(--green);}
.status-msg.wrong{color:var(--red);}

/* History dots */
.history-dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;min-height:14px;margin-top:6px;}
.hdot{width:10px;height:10px;border-radius:50%;animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.hdot.correct{background:var(--green);}
.hdot.wrong{background:var(--red);}
.hdot.skip{background:rgba(255,255,255,.2);}

/* Result overlay */
.result-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.8);opacity:0;pointer-events:none;transition:opacity .3s;padding:16px;}
.result-overlay.show{opacity:1;pointer-events:all;}
.result-box{background:linear-gradient(145deg,var(--mid),var(--card));border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:30px 28px;text-align:center;width:100%;max-width:400px;transform:scale(.85);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
.result-overlay.show .result-box{transform:scale(1);}
.result-emoji{font-size:3.2rem;margin-bottom:6px;}
.result-title{font-family:'Jua',cursive;font-size:1.8rem;margin-bottom:6px;}
.result-title.correct{color:var(--green);}
.result-title.wrong{color:var(--red);}
.result-detail{font-size:.92rem;color:rgba(255,255,255,.55);margin-bottom:5px;}
.result-detail strong{color:var(--yellow);font-size:1rem;}
.result-pts{font-family:'Jua',cursive;color:var(--green);font-size:1rem;margin-bottom:16px;}
.result-poke-img{width:90px;height:90px;object-fit:contain;margin:0 auto 10px;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));}
.btn-next{width:100%;background:linear-gradient(135deg,var(--blue),#1d4ed8);color:white;font-family:'Jua',cursive;font-size:1rem;border:none;border-radius:14px;padding:14px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;}
.btn-next:active{transform:scale(.97);}

/* Confetti */
.conf{position:fixed;top:-20px;z-index:200;pointer-events:none;animation:cffall linear forwards;}
@keyframes cffall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Animations */
.shake{animation:shake .45s;}
@keyframes shake{20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.celebrate{animation:celeb .55s;}
@keyframes celeb{30%{transform:scale(1.04) rotate(-1deg)}60%{transform:scale(1.02) rotate(1deg)}100%{transform:none}}

.err-box{background:rgba(227,53,13,.1);border:1px solid rgba(227,53,13,.3);border-radius:12px;padding:10px 14px;font-size:.88rem;color:#ff8878;margin-bottom:10px;display:none;}

@media(max-width:380px){
  .poke-img,.img-wrap,.loading-wrap{width:130px;height:130px;}
  .choices{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<header>
  <div class="logo"><span class="pokeball-ico"></span>포켓몬 한글 퀴즈<span class="pokeball-ico"></span></div>
</header>

<div class="stats-bar">
  <div class="chip score">⭐ <span id="score-val">0</span>점</div>
  <div class="chip timer">⏱ <span id="timer-val">120</span>초</div>
  <div class="chip streak">🔥 연속 <span id="streak-val">0</span></div>
</div>

<div class="game-area">
  <div class="gen-row">
    <button class="gen-btn active" data-gen="all">전체</button>
    <button class="gen-btn" data-gen="1">1세대</button>
    <button class="gen-btn" data-gen="2">2세대</button>
    <button class="gen-btn" data-gen="3">3세대</button>
    <button class="gen-btn" data-gen="4">4세대</button>
    <button class="gen-btn" data-gen="5">5세대</button>
    <button class="gen-btn" data-gen="6">6세대</button>
    <button class="gen-btn" data-gen="7">7세대</button>
    <button class="gen-btn" data-gen="8">8세대</button>
    <button class="gen-btn" data-gen="9">9세대</button>
  </div>

  <div class="err-box" id="err-box">⚠️ 인터넷 연결을 확인해 주세요.</div>

  <div class="poke-card" id="poke-card">
    <div class="poke-num" id="poke-num">#000</div>

    <div class="loading-wrap" id="loading-wrap"><div class="pokeball-spin"></div></div>
    <img class="poke-img" id="poke-img" src="" alt="포켓몬" style="display:none">

    <div class="hint-panel" id="hint-panel"></div>

    <div class="status-msg" id="status-msg">이름을 써보세요! ✍️</div>

    <!-- ── Phase 1: Draw ── -->
    <div class="phase-draw" id="phase-draw">
      <div class="draw-label">✍️ 포켓몬 이름을 손으로 써보세요!</div>
      <div class="canvas-tools">
        <button class="tool-btn" onclick="clearCanvas()">🗑️ 지우기</button>
        <button class="tool-btn" id="erase-btn" onclick="toggleErase()">⬜ 지우개</button>
        <div class="pen-size">굵기<input type="range" id="pen-size" min="3" max="24" value="8"></div>
      </div>
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="draw-canvas"></canvas>
        <div class="canvas-guide" id="canvas-guide">여기에 써요 ✏️</div>
      </div>
      <button class="btn-confirm" onclick="confirmDrawing()">다 썼어요! 보기 보여줘 →</button>
    </div>

    <!-- ── Phase 2: Multiple choice ── -->
    <div class="phase-choice" id="phase-choice">
      <div class="written-preview">
        <img id="written-img" class="written-img" src="" alt="내가 쓴 글씨">
        <div style="font-size:.82rem;">내가 쓴 글씨 👆</div>
      </div>
      <div class="choice-label">맞는 이름을 골라요! 👇</div>
      <div class="choices" id="choices"></div>
      <button class="btn-retry" onclick="retryDraw()">✏️ 다시 써볼게요</button>
    </div>

    <div class="controls-row">
      <button class="btn btn-hint" id="btn-hint" onclick="showHint()">💡 힌트 1</button>
      <button class="btn btn-skip" onclick="skipPokemon()">⏭ 건너뛰기</button>
    </div>

    <div class="history-dots" id="history-dots"></div>
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="result-overlay">
  <div class="result-box">
    <div class="result-emoji" id="r-emoji">🎉</div>
    <img class="result-poke-img" id="r-img" src="" alt="">
    <div class="result-title" id="r-title">정답!</div>
    <div class="result-detail" id="r-detail"></div>
    <div class="result-pts" id="r-pts"></div>
    <button class="btn-next" onclick="nextPokemon()">다음 포켓몬 →</button>
  </div>
</div>

// ── State ──
let cur=null,score=0,streak=0,timer=120,tIv=null,hintsShown=0,history=[],answered=false,selGen='all';
let canvas,ctx,drawing=false,erasing=false,hasDrawn=false;
const cache={};

// ── Init ──
function init(){
  makeStars();
  document.querySelectorAll('.gen-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.gen-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');selGen=b.dataset.gen;loadNext();
    });
  });
  setTimeout(initCanvas,150);
  loadNext();
}

function makeStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
}

// ── Canvas ──
function initCanvas(){
  canvas=document.getElementById('draw-canvas');
  const wrap=document.getElementById('canvas-wrap');
  canvas.width=wrap.clientWidth||500;
  canvas.height=160;
  resetCanvas();

  canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();startDraw((t.clientX-r.left)*(canvas.width/r.width),(t.clientY-r.top)*(canvas.height/r.height));},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();doDraw((t.clientX-r.left)*(canvas.width/r.width),(t.clientY-r.top)*(canvas.height/r.height));},{passive:false});
  canvas.addEventListener('touchend',()=>endDraw());
  canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();startDraw(e.clientX-r.left,e.clientY-r.top);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const r=canvas.getBoundingClientRect();doDraw(e.clientX-r.left,e.clientY-r.top);});
  canvas.addEventListener('mouseup',()=>endDraw());
  canvas.addEventListener('mouseleave',()=>endDraw());
}

function resetCanvas(){
  if(!ctx)ctx=canvas.getContext('2d');
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='white';ctx.fillRect(0,0,canvas.width,canvas.height);
  hasDrawn=false;
  const g=document.getElementById('canvas-guide');
  if(g)g.style.opacity='1';
}

function startDraw(x,y){
  drawing=true;hasDrawn=true;
  const g=document.getElementById('canvas-guide');
  if(g)g.style.opacity='0';
  ctx.beginPath();ctx.moveTo(x,y);
}
function doDraw(x,y){
  if(!drawing)return;
  ctx.globalCompositeOperation=erasing?'destination-out':'source-over';
  ctx.strokeStyle=erasing?'rgba(255,255,255,1)':'#111';
  ctx.lineWidth=erasing?30:parseInt(document.getElementById('pen-size').value||8);
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.lineTo(x,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y);
}
function endDraw(){drawing=false;ctx.beginPath();}

function clearCanvas(){
  resetCanvas();erasing=false;
  const eb=document.getElementById('erase-btn');
  eb.textContent='⬜ 지우개';eb.classList.remove('erase-on');
}

function toggleErase(){
  erasing=!erasing;
  const eb=document.getElementById('erase-btn');
  eb.textContent=erasing?'✏️ 펜':'⬜ 지우개';
  eb.classList.toggle('erase-on',erasing);
}

// ── Pokemon loading ──
function getIds(){
  const ids=Object.keys(KO).map(Number);
  if(selGen==='all')return ids;
  const [lo,hi]=GEN[selGen];
  return ids.filter(n=>n>=lo&&n<=hi);
}

function getSpriteUrl(id){return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;}
function getFallbackUrl(id){return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;}

async function loadNext(){
  answered=false;hintsShown=0;
  clearInterval(tIv);
  const ids=getIds();
  const id=ids[Math.floor(Math.random()*ids.length)];

  // Reset UI
  document.getElementById('poke-num').textContent=`#${String(id).padStart(3,'0')}`;
  document.getElementById('hint-panel').innerHTML='';
  document.getElementById('btn-hint').textContent='💡 힌트 1';
  setStatus('이름을 써보세요! ✍️','');
  document.getElementById('err-box').style.display='none';
  showPhase('draw');
  if(canvas)clearCanvas();
  erasing=false;

  const img=document.getElementById('poke-img');
  const lw=document.getElementById('loading-wrap');
  img.style.display='none';img.className='poke-img';lw.style.display='flex';
  const oldPh=document.getElementById('poke-placeholder');
  if(oldPh)oldPh.remove();

  // Load species data
  let sd=cache[id];
  if(!sd){
    sd={ko:KO[id],color:'불명',habitat:'불명',height:'불명',weight:'불명',types:['불명'],genus:'불명',flavor:'도감 정보를 불러오는 중...',sprite:getSpriteUrl(id)};
    try{
      const ctrl=new AbortController();
      const tout=setTimeout(()=>ctrl.abort(),8000);
      const [pr,sr]=await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`,{signal:ctrl.signal}),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`,{signal:ctrl.signal})
      ]);
      clearTimeout(tout);
      const pd=await pr.json(),sp=await sr.json();
      const types=pd.types.map(t=>TM[t.type.name]||t.type.name);
      const koName=(sp.names.find(n=>n.language.name==='ko')||{}).name||KO[id];
      const koGenus=(sp.genera.find(g=>g.language.name==='ko')||{}).genus||'불명';
      const flavors=sp.flavor_text_entries.filter(f=>f.language.name==='ko');
      const flavor=flavors.length?flavors[flavors.length-1].flavor_text.replace(/[\n\f]/g,' '):'설명 없음';
      sd={ko:koName,color:CM[sp.color?.name]||sp.color?.name||'불명',habitat:sp.habitat?HM[sp.habitat.name]||sp.habitat.name:'불명',height:`${(pd.height/10).toFixed(1)}m`,weight:`${(pd.weight/10).toFixed(1)}kg`,types,genus:koGenus,flavor,sprite:getSpriteUrl(id)};
    }catch(e){console.warn('PokeAPI failed',e);}
    cache[id]=sd;
  }

  cur={id,ko:sd.ko||KO[id],sd};

  // 게임 즉시 시작 — 이미지는 나중에 로드되면 표시
  lw.style.display='none';
  img.style.display='block';
  startTimer();

  img.onload=()=>{ img.style.display='block'; lw.style.display='none'; };
  img.onerror=()=>{
    if(img.src!==getFallbackUrl(id)){ img.src=getFallbackUrl(id); return; }
    img.style.display='none';
    const oldPh=document.getElementById('poke-placeholder');
    if(oldPh)oldPh.remove();
    const ph=document.createElement('div');ph.id='poke-placeholder';
    ph.style.cssText='width:160px;height:160px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:5rem;';
    ph.textContent='❓';lw.parentNode.insertBefore(ph,img);
  };
  img.src=sd.sprite;
}

// ── Timer ──
function startTimer(){
  timer=120;updTimer();
  tIv=setInterval(()=>{timer--;updTimer();if(timer<=0){clearInterval(tIv);timeUp();}},1000);
}
function updTimer(){
  const e=document.getElementById('timer-val');
  e.textContent=timer;e.className=timer<=20?'urgent':'';
}
function timeUp(){if(answered)return;answered=true;showResult(false);}

// ── Phase control ──
function showPhase(phase){
  document.getElementById('phase-draw').style.display=phase==='draw'?'block':'none';
  document.getElementById('phase-choice').style.display=phase==='choice'?'block':'none';
}

// ── Confirm drawing → show choices ──
function confirmDrawing(){
  if(answered)return;

  // Save canvas snapshot as mini image
  const dataUrl=canvas.toDataURL('image/png');
  const wi=document.getElementById('written-img');
  wi.src=dataUrl;
  wi.style.display=hasDrawn?'block':'none';

  // Build 3 choices: correct + 2 random wrong
  const allNames=Object.values(KO).filter(n=>n!==cur.ko);
  const wrong=[];
  while(wrong.length<2){
    const pick=allNames[Math.floor(Math.random()*allNames.length)];
    if(!wrong.includes(pick))wrong.push(pick);
  }
  const options=[cur.ko,...wrong].sort(()=>Math.random()-.5);

  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=opt;
    btn.onclick=()=>selectChoice(opt,btn,options,choicesEl);
    choicesEl.appendChild(btn);
  });

  showPhase('choice');
}

function selectChoice(chosen,btn,options,choicesEl){
  if(answered)return;
  const ok=chosen===cur.ko;
  answered=true;clearInterval(tIv);

  // Highlight all buttons
  choicesEl.querySelectorAll('.choice-btn').forEach(b=>{
    if(b.textContent===cur.ko)b.classList.add(ok&&b===btn?'correct':'reveal');
    else if(b===btn)b.classList.add('wrong');
  });
  btn.style.pointerEvents='none';
  choicesEl.style.pointerEvents='none';

  if(ok){
    const pts=Math.max(5,10+Math.max(0,timer)*1-hintsShown*3)+(streak>1?streak*2:0);
    score+=pts;streak++;
    document.getElementById('score-val').textContent=score;
    document.getElementById('streak-val').textContent=streak;
    setStatus(`✅ 정답! "${cur.ko}" 맞아요!`,'correct');
    addHistory('correct');launchConfetti();
    document.getElementById('poke-card').classList.add('celebrate');
    setTimeout(()=>document.getElementById('poke-card').classList.remove('celebrate'),600);
    setTimeout(()=>showResult(true,pts),900);
  }else{
    streak=0;document.getElementById('streak-val').textContent=0;
    setStatus(`❌ 아쉬워요! 정답은 "${cur.ko}"이에요`,'wrong');
    addHistory('wrong');
    document.getElementById('poke-card').classList.add('shake');
    setTimeout(()=>document.getElementById('poke-card').classList.remove('shake'),480);
    setTimeout(()=>showResult(false),1200);
  }
}

function retryDraw(){
  if(answered)return;
  showPhase('draw');
  clearCanvas();
}

// ── Hint ──
function showHint(){
  if(answered)return;
  const sd=cur.sd;
  const hints=[
    {icon:'🎨',label:'몸 색깔',val:`이 포켓몬의 몸 색깔은 <strong>${sd.color}</strong>이에요.`},
    {icon:'🏠',label:'서식지',val:`주로 <strong>${sd.habitat}</strong>에서 살아요.`},
    {icon:'📏',label:'키',val:`키는 <strong>${sd.height}</strong>이에요.`},
    {icon:'⚖️',label:'몸무게',val:`몸무게는 <strong>${sd.weight}</strong>이에요.`},
    {icon:'🔮',label:'타입',val:`타입은 ${sd.types.map(t=>`<span class="type-badge" style="background:${TC[t]||'#888'}">${t}</span>`).join(' ')}이에요.`},
    {icon:'📖',label:'분류',val:`분류는 <strong>${sd.genus}</strong>이에요.`},
    {icon:'💬',label:'도감 설명',val:`<em>"${sd.flavor}"</em>`},
  ];
  if(hintsShown>=hints.length){document.getElementById('btn-hint').textContent='💡 힌트 없음';return;}
  const h=hints[hintsShown];
  const row=document.createElement('div');row.className='hint-row';
  row.innerHTML=`<span class="hint-icon">${h.icon}</span><span class="hint-text"><strong>[${h.label}]</strong> ${h.val}</span>`;
  document.getElementById('hint-panel').appendChild(row);
  hintsShown++;
  const rem=hints.length-hintsShown;
  document.getElementById('btn-hint').textContent=rem>0?`💡 힌트 ${hintsShown+1}`:'💡 힌트 없음';
}

// ── Skip ──
function skipPokemon(){
  if(answered)return;
  answered=true;clearInterval(tIv);
  streak=0;document.getElementById('streak-val').textContent=0;
  addHistory('skip');showResult(false);
}

// ── Result overlay ──
function showResult(ok,pts=0){
  const OE=['🎉','✨','🌟','🎊','🔥'],WE=['😅','💦','🙈','😢'];
  document.getElementById('r-emoji').textContent=ok?OE[~~(Math.random()*OE.length)]:WE[~~(Math.random()*WE.length)];
  document.getElementById('r-title').textContent=ok?'정답이에요!':'아쉽게도...';
  document.getElementById('r-title').className='result-title '+(ok?'correct':'wrong');
  document.getElementById('r-detail').innerHTML=ok
    ?`<strong>${cur.ko}</strong> 맞아요! 👏`
    :`정답은 <strong>${cur.ko}</strong> 이었어요!`;
  document.getElementById('r-pts').textContent=ok?`+${pts}점! (누적 ${score}점)`:'연속 정답 리셋 😢';
  document.getElementById('r-img').src=cur.sd.sprite;
  document.getElementById('result-overlay').classList.add('show');
}

function nextPokemon(){
  document.getElementById('result-overlay').classList.remove('show');
  loadNext();
}

// ── History ──
function addHistory(type){
  history.push(type);if(history.length>24)history.shift();
  const el=document.getElementById('history-dots');el.innerHTML='';
  history.forEach(h=>{const d=document.createElement('div');d.className=`hdot ${h}`;el.appendChild(d);});
}

function setStatus(msg,cls){
  const e=document.getElementById('status-msg');
  e.textContent=msg;e.className='status-msg'+(cls?' '+cls:'');
}

// ── Confetti ──
function launchConfetti(){
  const cols=['#FFCB05','#E3350D','#3D7DCA','#2ea043','#ff7eb3','#a855f7','#f97316'];
  for(let i=0;i<55;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='conf';
      const sz=5+Math.random()*9;
      el.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.4}s`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
    },i*28);
  }
}

init();
</script>
