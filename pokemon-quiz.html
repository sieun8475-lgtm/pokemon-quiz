<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>포켓몬 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E3350D;--yellow:#FFCB05;--blue:#3D7DCA;
  --dark:#0d1117;--mid:#161b22;--card:#1c2333;
  --white:#e6edf3;--green:#2ea043;--pink:#ff7eb3;
  --border:rgba(255,255,255,.1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Nanum Gothic',sans-serif;
  background:var(--dark);color:var(--white);
  min-height:100vh;min-height:-webkit-fill-available;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 10%,rgba(61,125,202,.12) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%,rgba(227,53,13,.08) 0%,transparent 60%);
  padding-bottom:calc(16px + var(--safe-bottom));
}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle 3s infinite alternate;}
@keyframes twinkle{from{opacity:.1}to{opacity:.5}}

/* Header */
header{position:relative;z-index:10;text-align:center;padding:18px 16px 6px;}
.logo{
  font-family:'Jua',cursive;font-size:clamp(1.7rem,5vw,2.8rem);
  background:linear-gradient(135deg,var(--yellow) 0%,#ff9900 50%,var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px rgba(255,203,5,.3));letter-spacing:2px;
}
.pokeball-ico{
  display:inline-block;width:22px;height:22px;vertical-align:middle;margin:0 5px;
  background:linear-gradient(to bottom,var(--red) 50%,white 50%);
  border-radius:50%;border:3px solid #444;position:relative;
}
.pokeball-ico::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:7px;height:7px;background:white;border-radius:50%;border:3px solid #444;
}

/* Stats */
.stats-bar{
  position:relative;z-index:10;
  display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:6px 12px;
}
.chip{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:50px;padding:6px 14px;
  font-family:'Jua',cursive;font-size:.95rem;
  display:flex;align-items:center;gap:4px;
}
.chip.score{border-color:rgba(255,203,5,.4);color:var(--yellow);}
.chip.timer{border-color:rgba(61,125,202,.4);color:#7ab8ff;}
.chip.streak{border-color:rgba(255,126,179,.4);color:var(--pink);}
#timer-val{font-size:1.15rem;transition:color .3s;}
#timer-val.urgent{color:var(--red)!important;animation:blink .5s infinite alternate;}
@keyframes blink{to{transform:scale(1.2);}}

/* Gen selector */
.game-area{position:relative;z-index:10;max-width:600px;margin:0 auto;padding:6px 12px 20px;}
.gen-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.gen-btn{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:rgba(255,255,255,.5);border-radius:50px;
  padding:6px 14px;font-family:'Jua',cursive;font-size:.82rem;
  cursor:pointer;transition:all .2s;
  /* iOS touch fix */
  -webkit-appearance:none;touch-action:manipulation;
}
.gen-btn.active,.gen-btn:active{background:var(--blue);border-color:var(--blue);color:white;}

/* Card */
.poke-card{
  background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  border:1px solid var(--border);border-radius:24px;
  padding:20px 18px 18px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);
  position:relative;overflow:hidden;
}
.poke-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,203,5,.04),transparent 65%);
  pointer-events:none;
}
.poke-num{font-family:'Jua',cursive;color:rgba(255,255,255,.2);font-size:.85rem;margin-bottom:4px;}

/* Image */
.img-wrap{width:180px;height:180px;margin:0 auto 10px;}
.poke-img{
  width:180px;height:180px;object-fit:contain;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.4));
}
.poke-img.revealed{filter:drop-shadow(0 8px 20px rgba(0,0,0,.4));}
.loading-wrap{width:180px;height:180px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.pokeball-spin{
  width:52px;height:52px;
  background:linear-gradient(to bottom,var(--red) 50%,white 50%);
  border-radius:50%;border:4px solid #444;position:relative;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.pokeball-spin::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:13px;height:13px;background:white;border-radius:50%;border:4px solid #444;
}

/* Hint panel */
.hint-panel{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:12px 14px;margin-bottom:12px;text-align:left;
}
.hint-panel:empty{background:none;border-color:transparent;padding:0;margin-bottom:6px;}
.hint-row{
  display:flex;align-items:flex-start;gap:9px;margin-bottom:8px;
  animation:slideIn .3s cubic-bezier(.34,1.56,.64,1);
}
.hint-row:last-child{margin-bottom:0;}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.hint-icon{font-size:1.15rem;flex-shrink:0;margin-top:1px;}
.hint-text{font-size:.92rem;line-height:1.55;color:rgba(255,255,255,.85);}
.hint-text strong{color:var(--yellow);}
.hint-text em{color:rgba(255,255,255,.6);font-style:normal;}
.type-badge{
  display:inline-block;padding:2px 9px;border-radius:50px;
  font-size:.75rem;font-weight:800;color:white;margin:2px 2px 2px 0;
}

/* ── Drawing Canvas ── */
.input-mode-toggle{display:flex;gap:8px;margin-bottom:10px;justify-content:center;}
.mode-btn{
  font-family:'Jua',cursive;font-size:.85rem;
  border:1.5px solid var(--border);border-radius:50px;
  padding:7px 16px;cursor:pointer;transition:all .2s;
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);
  touch-action:manipulation;-webkit-appearance:none;
}
.mode-btn.active{background:var(--blue);border-color:var(--blue);color:white;}

.canvas-wrap{
  position:relative;margin-bottom:10px;
  border:2.5px solid rgba(255,255,255,.2);
  border-radius:16px;overflow:hidden;
  background:rgba(255,255,255,.96);
  touch-action:none;
}
#draw-canvas{display:block;width:100%;cursor:crosshair;}

.canvas-tools{
  display:flex;gap:8px;margin-bottom:10px;align-items:center;
}
.tool-btn{
  font-family:'Jua',cursive;font-size:.82rem;
  border:1.5px solid var(--border);border-radius:10px;
  padding:7px 14px;cursor:pointer;
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);
  touch-action:manipulation;-webkit-appearance:none;transition:all .15s;
}
.tool-btn:active{transform:scale(.95);}
.tool-btn.erase{color:#ff7eb3;border-color:rgba(255,126,179,.4);}
.pen-size{display:flex;align-items:center;gap:6px;font-size:.82rem;color:rgba(255,255,255,.5);margin-left:auto;}
.pen-size input{width:70px;accent-color:var(--blue);}

.ai-status{
  font-size:.88rem;min-height:22px;margin-bottom:8px;
  text-align:center;color:rgba(255,255,255,.4);transition:all .3s;
}
.ai-status.thinking{color:var(--yellow);animation:pulse .8s infinite alternate;}
.ai-status.correct{color:var(--green);}
.ai-status.wrong{color:var(--red);}
@keyframes pulse{from{opacity:.5}to{opacity:1}}

/* Secondary controls */
.controls-row{display:flex;gap:8px;margin-bottom:10px;}
.btn{
  font-family:'Jua',cursive;border:none;border-radius:14px;
  padding:12px 10px;font-size:.9rem;cursor:pointer;
  transition:all .15s;flex:1;
  touch-action:manipulation;-webkit-appearance:none;
}
.btn:active{transform:scale(.96);filter:brightness(.9);}
.btn-hint{background:rgba(255,203,5,.12);border:1px solid rgba(255,203,5,.4);color:var(--yellow);}
.btn-skip{background:rgba(255,255,255,.07);border:1px solid var(--border);color:rgba(255,255,255,.6);}

/* Voice button — shown only if supported */
.btn-voice{
  background:linear-gradient(135deg,var(--red),#c0392b);
  color:white;font-family:'Jua',cursive;font-size:.9rem;
  border:none;border-radius:14px;padding:12px 10px;
  cursor:pointer;flex:1;
  touch-action:manipulation;-webkit-appearance:none;
  display:none; /* hidden by default, shown via JS if supported */
  transition:all .15s;
}
.btn-voice.listening{animation:micGlow 1s infinite;}
.btn-voice:active{transform:scale(.96);}
@keyframes micGlow{
  0%,100%{box-shadow:0 4px 16px rgba(227,53,13,.3)}
  50%{box-shadow:0 4px 32px rgba(227,53,13,.7),0 0 0 6px rgba(227,53,13,.1)}
}

/* Status message */
.status-msg{
  font-size:.88rem;color:rgba(255,255,255,.4);
  min-height:20px;margin-bottom:8px;text-align:center;
  transition:all .25s;
}
.status-msg.listening{color:var(--yellow);}
.status-msg.correct{color:var(--green);}
.status-msg.wrong{color:var(--red);}

/* History dots */
.history-dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;min-height:14px;}
.hdot{width:10px;height:10px;border-radius:50%;animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.hdot.correct{background:var(--green);}
.hdot.wrong{background:var(--red);}
.hdot.skip{background:rgba(255,255,255,.2);}

/* Error */
.err-box{
  background:rgba(227,53,13,.1);border:1px solid rgba(227,53,13,.3);
  border-radius:12px;padding:10px 14px;font-size:.88rem;color:#ff8878;
  margin-bottom:10px;display:none;
}

/* Result overlay */
.result-overlay{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.8);
  opacity:0;pointer-events:none;transition:opacity .3s;
  padding:16px;
}
.result-overlay.show{opacity:1;pointer-events:all;}
.result-box{
  background:linear-gradient(145deg,var(--mid),var(--card));
  border:1px solid rgba(255,255,255,.15);border-radius:24px;
  padding:32px 28px;text-align:center;width:100%;max-width:400px;
  transform:scale(.85);transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
.result-overlay.show .result-box{transform:scale(1);}
.result-emoji{font-size:3.5rem;margin-bottom:6px;}
.result-title{font-family:'Jua',cursive;font-size:1.8rem;margin-bottom:6px;}
.result-title.correct{color:var(--green);}
.result-title.wrong{color:var(--red);}
.result-detail{font-size:.95rem;color:rgba(255,255,255,.55);margin-bottom:5px;}
.result-detail strong{color:var(--yellow);font-size:1.05rem;}
.result-pts{font-family:'Jua',cursive;color:var(--green);font-size:1rem;margin-bottom:16px;}
.btn-next{
  width:100%;background:linear-gradient(135deg,var(--blue),#1d4ed8);
  color:white;font-family:'Jua',cursive;font-size:1.05rem;
  border:none;border-radius:14px;padding:14px;
  cursor:pointer;touch-action:manipulation;-webkit-appearance:none;
  box-shadow:0 4px 16px rgba(61,125,202,.4);
}
.btn-next:active{transform:scale(.97);}

/* Reveal pokemon image in result */
.result-poke-img{
  width:100px;height:100px;object-fit:contain;
  margin:0 auto 10px;display:block;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.4));
}

/* Confetti */
.conf{position:fixed;top:-20px;z-index:200;pointer-events:none;animation:cffall linear forwards;}
@keyframes cffall{
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* Animations */
.shake{animation:shake .45s;}
@keyframes shake{20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.celebrate{animation:celeb .55s;}
@keyframes celeb{30%{transform:scale(1.04) rotate(-1deg)}60%{transform:scale(1.02) rotate(1deg)}100%{transform:none}}

@media(max-width:380px){
  .poke-img,.img-wrap,.loading-wrap{width:150px;height:150px;}
  .logo{font-size:1.5rem;}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<header>
  <div class="logo"><span class="pokeball-ico"></span>포켓몬 퀴즈<span class="pokeball-ico"></span></div>
</header>

<div class="stats-bar">
  <div class="chip score">⭐ <span id="score-val">0</span>점</div>
  <div class="chip timer">⏱ <span id="timer-val">120</span>초</div>
  <div class="chip streak">🔥 연속 <span id="streak-val">0</span></div>
</div>

<div class="game-area">
  <div class="gen-row">
    <button class="gen-btn active" data-gen="all">전체</button>
    <button class="gen-btn" data-gen="1">1세대</button>
    <button class="gen-btn" data-gen="2">2세대</button>
    <button class="gen-btn" data-gen="3">3세대</button>
    <button class="gen-btn" data-gen="4">4세대</button>
    <button class="gen-btn" data-gen="5">5세대</button>
    <button class="gen-btn" data-gen="6">6세대</button>
    <button class="gen-btn" data-gen="7">7세대</button>
    <button class="gen-btn" data-gen="8">8세대</button>
    <button class="gen-btn" data-gen="9">9세대</button>
  </div>

  <div class="err-box" id="err-box">⚠️ 포켓몬 정보를 불러오지 못했어요. 인터넷 연결을 확인해 주세요.</div>

  <div class="poke-card" id="poke-card">
    <div class="poke-num" id="poke-num">#000</div>

    <div class="loading-wrap" id="loading-wrap"><div class="pokeball-spin"></div></div>
    <img class="poke-img" id="poke-img" src="" alt="포켓몬" style="display:none">

    <div class="hint-panel" id="hint-panel"></div>

    <div class="status-msg" id="status-msg">이름을 맞춰보세요! 👇</div>

    <!-- Input mode toggle -->
    <div class="input-mode-toggle">
      <button class="mode-btn active" id="mode-draw" onclick="setMode('draw')">✍️ 손으로 쓰기</button>
      <button class="mode-btn" id="mode-type" onclick="setMode('type')">⌨️ 타이핑</button>
    </div>

    <!-- Drawing canvas -->
    <div id="draw-section">
      <div class="canvas-tools">
        <button class="tool-btn" onclick="clearCanvas()">🗑️ 지우기</button>
        <button class="tool-btn erase" id="erase-btn" onclick="toggleErase()">⬜ 지우개</button>
        <div class="pen-size">
          굵기 <input type="range" id="pen-size" min="2" max="20" value="6">
        </div>
      </div>
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="draw-canvas"></canvas>
      </div>
      <button class="btn-answer" id="btn-ai-check" onclick="submitDrawing()">🤖 AI가 읽어볼게요!</button>
    </div>

    <!-- Typing input (hidden by default) -->
    <div id="type-section" style="display:none">
      <input
        class="answer-input" id="answer-input"
        type="text" inputmode="text" autocomplete="off"
        autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="포켓몬 이름을 입력하세요"
        onkeydown="if(event.key==='Enter'){event.preventDefault();submitAnswer();}"
        style="width:100%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);border-radius:16px;padding:14px 18px;color:white;font-family:'Jua',cursive;font-size:1.1rem;outline:none;margin-bottom:10px;text-align:center;letter-spacing:1px;-webkit-appearance:none;"
      >
      <button class="btn-answer" onclick="submitAnswer()"
        style="width:100%;background:linear-gradient(135deg,var(--blue),#1d4ed8);color:white;font-family:'Jua',cursive;font-size:1.15rem;border:none;border-radius:16px;padding:16px;cursor:pointer;box-shadow:0 4px 20px rgba(61,125,202,.4);touch-action:manipulation;">✅ 정답 확인!</button>
    </div>

    <div class="ai-status" id="ai-status"></div>

    <div class="controls-row">
      <button class="btn-voice" id="btn-voice" onclick="toggleVoice()">🎤 말하기</button>
      <button class="btn btn-hint" id="btn-hint" onclick="showHint()">💡 힌트 1</button>
      <button class="btn btn-skip" onclick="skipPokemon()">⏭ 건너뛰기</button>
    </div>

    <div class="history-dots" id="history-dots"></div>
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="result-overlay">
  <div class="result-box">
    <div class="result-emoji" id="r-emoji">🎉</div>
    <img class="result-poke-img" id="r-img" src="" alt="">
    <div class="result-title" id="r-title">정답!</div>
    <div class="result-detail" id="r-detail"></div>
    <div class="result-pts" id="r-pts"></div>
    <button class="btn-next" onclick="nextPokemon()">다음 포켓몬 →</button>
  </div>
</div>

// ── Init ──
function init(){
  makeStars();
  document.querySelectorAll('.gen-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.gen-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');selGen=b.dataset.gen;loadNext();
    });
  });
  // Check voice support
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    voiceSupported=true;
    document.getElementById('btn-voice').style.display='flex';
    setupVoice(SR);
  }
  // Init canvas after DOM ready
  setTimeout(initCanvas, 100);
  loadNext();
}

function makeStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
}

function getIds(){
  const ids=Object.keys(KO).map(Number);
  if(selGen==='all')return ids;
  const [lo,hi]=GEN[selGen];
  return ids.filter(n=>n>=lo&&n<=hi);
}

// ── Image URL helpers ──
// Try multiple CDNs in order for best iPhone/Safari compatibility
function getSpriteUrl(id){
  // Official artwork via PokeAPI sprites (GitHub raw — works on most devices)
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
}
function getFallbackUrl(id){
  // Smaller default sprite as fallback
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
}

// ── Load Pokemon ──
async function loadNext(){
  answered=false;hintsShown=0;
  clearInterval(tIv);stopListening();
  const ids=getIds();
  const id=ids[Math.floor(Math.random()*ids.length)];

  document.getElementById('poke-num').textContent=`#${String(id).padStart(3,'0')}`;
  document.getElementById('hint-panel').innerHTML='';
  document.getElementById('btn-hint').textContent='💡 힌트 1';
  setStatus('이름을 맞춰보세요! 👇','');
  document.getElementById('answer-input').value='';
  document.getElementById('err-box').style.display='none';
  setAiStatus('','');
  if(canvas) clearCanvas();
  erasing=false;
  const eb=document.getElementById('erase-btn');
  if(eb){eb.textContent='⬜ 지우개';eb.style.background='rgba(255,255,255,.07)';}
  document.getElementById('btn-ai-check').disabled=false;

  const img=document.getElementById('poke-img');
  const lw=document.getElementById('loading-wrap');
  img.style.display='none';img.className='poke-img';lw.style.display='flex';

  setTimeout(()=>{ if(!answered) document.getElementById('answer-input').focus(); },600);

  let sd=cache[id];
  if(!sd){
    // Build minimal species data from built-in KO map first (works offline)
    sd={
      ko:KO[id], color:'불명', habitat:'불명',
      height:'불명', weight:'불명',
      types:['불명'], genus:'불명',
      flavor:'도감 정보를 불러오는 중이에요...',
      sprite:getSpriteUrl(id)
    };

    // Try fetching full data — works when online
    try{
      const ctrl=new AbortController();
      const tout=setTimeout(()=>ctrl.abort(),8000); // 8s timeout
      const [pr,sr]=await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`,{signal:ctrl.signal}),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`,{signal:ctrl.signal})
      ]);
      clearTimeout(tout);
      const pd=await pr.json(),sp=await sr.json();
      const types=pd.types.map(t=>TM[t.type.name]||t.type.name);
      const koName=(sp.names.find(n=>n.language.name==='ko')||{}).name||KO[id];
      const koGenus=(sp.genera.find(g=>g.language.name==='ko')||{}).genus||'불명';
      const flavors=sp.flavor_text_entries.filter(f=>f.language.name==='ko');
      const flavor=flavors.length?flavors[flavors.length-1].flavor_text.replace(/[\n\f]/g,' '):'도감 설명이 없어요.';
      sd={
        ko:koName,
        color:CM[sp.color?.name]||sp.color?.name||'불명',
        habitat:sp.habitat?HM[sp.habitat.name]||sp.habitat.name:'서식지 불명',
        height:`${(pd.height/10).toFixed(1)}m`,
        weight:`${(pd.weight/10).toFixed(1)}kg`,
        types, genus:koGenus, flavor,
        sprite:getSpriteUrl(id)
      };
    }catch(e){
      // Offline or API error — use built-in data, hide error (game still works!)
      console.warn('PokeAPI fetch failed, using built-in data',e);
    }
    cache[id]=sd;
  }

  cur={id, ko:sd.ko||KO[id], sd};
  img.onload=()=>{lw.style.display='none';img.style.display='block';startTimer();};
  img.onerror=()=>{
    // Try fallback sprite URL
    if(img.src!==getFallbackUrl(id)){
      img.src=getFallbackUrl(id);
    } else {
      // If both fail, show number placeholder
      lw.style.display='none';
      img.style.display='none';
      const ph=document.createElement('div');
      ph.style.cssText='width:180px;height:180px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:Jua,cursive;font-size:3rem;color:rgba(255,255,255,.2);';
      ph.textContent='?';
      img.parentNode.insertBefore(ph,img);
      startTimer();
    }
  };
  img.src=sd.sprite;
}

// ── Timer ──
function startTimer(){
  timer=120;updTimer();
  tIv=setInterval(()=>{timer--;updTimer();if(timer<=0){clearInterval(tIv);timeUp();}},1000);
}
function updTimer(){
  const e=document.getElementById('timer-val');
  e.textContent=timer;e.className=timer<=20?'urgent':'';
}
function timeUp(){if(answered)return;answered=true;stopListening();revealImg();showResult(false);}

// ── Hints ──
function showHint(){
  if(answered)return;
  const sd=cur.sd;
  const hints=[
    {icon:'🎨',label:'몸 색깔',    val:`이 포켓몬의 몸 색깔은 <strong>${sd.color}</strong>이에요.`},
    {icon:'🏠',label:'서식지',     val:`주로 <strong>${sd.habitat}</strong>에서 살아요.`},
    {icon:'📏',label:'키',         val:`이 포켓몬의 키는 <strong>${sd.height}</strong>이에요.`},
    {icon:'⚖️',label:'몸무게',     val:`몸무게는 <strong>${sd.weight}</strong>이에요.`},
    {icon:'🔮',label:'타입',       val:`타입은 ${sd.types.map(t=>`<span class="type-badge" style="background:${TC[t]||'#888'}">${t}</span>`).join(' ')} 이에요.`},
    {icon:'📖',label:'분류',       val:`포켓몬 분류는 <strong>${sd.genus}</strong>이에요.`},
    {icon:'💬',label:'도감 설명',  val:`<em>"${sd.flavor}"</em>`},
  ];
  if(hintsShown>=hints.length){
    document.getElementById('btn-hint').textContent='💡 힌트 없음';return;
  }
  const h=hints[hintsShown];
  const row=document.createElement('div');row.className='hint-row';
  row.innerHTML=`<span class="hint-icon">${h.icon}</span><span class="hint-text"><strong>[${h.label}]</strong> ${h.val}</span>`;
  document.getElementById('hint-panel').appendChild(row);
  hintsShown++;
  const rem=hints.length-hintsShown;
  document.getElementById('btn-hint').textContent=rem>0?`💡 힌트 ${hintsShown+1}`:'💡 힌트 없음';
}

// ── Skip ──
function skipPokemon(){
  if(answered)return;
  answered=true;clearInterval(tIv);stopListening();
  streak=0;document.getElementById('streak-val').textContent=0;
  addHistory('skip');revealImg();showResult(false);
}

// ── Answer ──
function norm(s){return s.trim().replace(/\s/g,'').toLowerCase();}

// 한국어 발음 유사도 — 자주 혼동되는 발음을 같은 그룹으로 정규화
function phonetic(s){
  return norm(s)
    // 모음 혼동
    .replace(/애|에/g,'에')
    .replace(/의|이/g,'이')
    .replace(/외|왜|웨/g,'웨')
    .replace(/위|뷔/g,'위')
    // 받침 혼동
    .replace(/ㄱ$|ㄲ$|ㅋ$/,'ㄱ')
    .replace(/ㄷ$|ㅅ$|ㅆ$|ㅈ$|ㅊ$|ㅌ$|ㅎ$/,'ㄷ')
    .replace(/ㅂ$|ㅍ$/,'ㅂ')
    // 자음 혼동 (음성인식 오류 패턴)
    .replace(/쮸|쭈|쮜/g,'츄')
    .replace(/츄|추/g,'츄')
    .replace(/쥐|쥐/g,'지')
    .replace(/져|저/g,'저')
    .replace(/죠|조/g,'조')
    .replace(/봐|봐/g,'봐')
    // 포켓몬 특화 — 자주 잘못 인식되는 패턴
    .replace(/피카추|피카쮸|피카쭈/g,'피카츄')
    .replace(/리자뭉|리자멍/g,'리자몽')
    .replace(/잠만봐|잠만뵤/g,'잠만보')
    .replace(/뮤쓰|뮤스/g,'뮤츠')
    .replace(/꼬부기|꼬부기/g,'꼬부기')
    .replace(/파이리|파이뤼/g,'파이리')
    .replace(/이브이|이브히/g,'이브이')
    .replace(/갸라도쓰|갸라도스/g,'갸라도스')
    .replace(/거북왕|거북황/g,'거북왕')
    .replace(/망나뇽|망나농/g,'망나뇽')
    // ♀ ♂ 기호 무시
    .replace(/[♀♂]/g,'');
}

// 편집 거리(Levenshtein) — 1~2글자 차이도 정답 처리
function editDist(a,b){
  const m=a.length,n=b.length;
  if(Math.abs(m-n)>2)return 99;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function checkAns(input){
  if(!cur)return false;
  const target=cur.ko||KO[cur.id]||'';
  // 1) 완전 일치
  if(norm(input)===norm(target))return true;
  // 2) 발음 정규화 후 일치
  if(phonetic(input)===phonetic(target))return true;
  // 3) 편집 거리 허용 (짧은 이름은 1글자, 긴 이름은 2글자까지)
  const threshold=target.replace(/[♀♂\s]/g,'').length<=3?1:2;
  if(editDist(phonetic(input),phonetic(target))<=threshold)return true;
  return false;
}

// ── Drawing Canvas ──
let canvas,ctx,drawing=false,erasing=false,drawMode='draw';

function initCanvas(){
  canvas=document.getElementById('draw-canvas');
  const wrap=document.getElementById('canvas-wrap');
  canvas.width=wrap.clientWidth||500;
  canvas.height=190;
  ctx=canvas.getContext('2d');
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.fillStyle='white';ctx.fillRect(0,0,canvas.width,canvas.height);

  canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();startDraw((t.clientX-r.left)*(canvas.width/r.width),(t.clientY-r.top)*(canvas.height/r.height));},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();doDraw((t.clientX-r.left)*(canvas.width/r.width),(t.clientY-r.top)*(canvas.height/r.height));},{passive:false});
  canvas.addEventListener('touchend',()=>endDraw());
  canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();startDraw(e.clientX-r.left,e.clientY-r.top);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const r=canvas.getBoundingClientRect();doDraw(e.clientX-r.left,e.clientY-r.top);});
  canvas.addEventListener('mouseup',()=>endDraw());
  canvas.addEventListener('mouseleave',()=>endDraw());
}

function startDraw(x,y){
  drawing=true;
  ctx.beginPath();ctx.moveTo(x,y);
}
function doDraw(x,y){
  if(!drawing)return;
  ctx.globalCompositeOperation=erasing?'destination-out':'source-over';
  ctx.strokeStyle=erasing?'rgba(255,255,255,1)':'#111';
  ctx.lineWidth=erasing?32:parseInt(document.getElementById('pen-size').value||6);
  ctx.lineTo(x,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y);
}
function endDraw(){drawing=false;ctx.beginPath();}

function clearCanvas(){
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='white';ctx.fillRect(0,0,canvas.width,canvas.height);
}
function toggleErase(){
  erasing=!erasing;
  const b=document.getElementById('erase-btn');
  b.textContent=erasing?'✏️ 펜으로':'⬜ 지우개';
  b.style.background=erasing?'rgba(255,126,179,.2)':'rgba(255,255,255,.07)';
}
function setMode(mode){
  drawMode=mode;
  document.getElementById('mode-draw').classList.toggle('active',mode==='draw');
  document.getElementById('mode-type').classList.toggle('active',mode==='type');
  document.getElementById('draw-section').style.display=mode==='draw'?'block':'none';
  document.getElementById('type-section').style.display=mode==='type'?'block':'none';
  if(mode==='type')setTimeout(()=>document.getElementById('answer-input').focus(),100);
}

// ── Claude AI Handwriting Recognition ──
async function submitDrawing(){
  if(answered)return;
  const imgData=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const hasContent=[...imgData].some((v,i)=>i%4!==3&&v<220);
  if(!hasContent){setAiStatus('✏️ 먼저 이름을 써보세요!','');return;}

  setAiStatus('🤖 AI가 글씨를 읽고 있어요...','thinking');
  document.getElementById('btn-ai-check').disabled=true;

  try{
    const b64=canvas.toDataURL('image/png').split(',')[1];
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:100,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/png',data:b64}},
          {type:'text',text:'이 이미지에 한글로 포켓몬 이름이 손으로 쓰여 있어요. 아이 글씨라 삐뚤빼뚤할 수 있어요. 쓰여진 텍스트만 읽어서 JSON으로만 답하세요. 예: {"text":"피카츄"} 읽기 어려우면 {"text":""}'}
        ]}]
      })
    });
    const data=await res.json();
    const raw=data.content?.[0]?.text||'{}';
    let recognized='';
    try{recognized=JSON.parse(raw.replace(/```json|```/g,'').trim()).text||'';}catch(e){}

    document.getElementById('btn-ai-check').disabled=false;

    if(!recognized){setAiStatus('😅 글씨를 못 읽었어요. 다시 써볼까요?','');return;}
    setAiStatus(`👀 "${recognized}" 라고 읽었어요!`,'');
    setTimeout(()=>processAns(recognized),700);

  }catch(e){
    document.getElementById('btn-ai-check').disabled=false;
    setAiStatus('⚠️ AI 연결 안됨 — 타이핑으로 입력해 주세요.','');
    setMode('type');
  }
}

function setAiStatus(msg,cls){
  const e=document.getElementById('ai-status');
  e.textContent=msg;e.className='ai-status'+(cls?' '+cls:'');
}

function submitAnswer(){
  const v=document.getElementById('answer-input').value.trim();
  if(!v||answered)return;
  processAns(v);
}

function processAns(input){
  if(answered)return;
  const ok=checkAns(input);
  answered=true;clearInterval(tIv);stopListening();revealImg();
  if(ok){
    const pts=Math.max(5,10+Math.max(0,timer)*2-hintsShown*5)+(streak>1?streak*3:0);
    score+=pts;streak++;
    document.getElementById('score-val').textContent=score;
    document.getElementById('streak-val').textContent=streak;
    setStatus(`✅ "${input}" 정답!`,'correct');
    addHistory('correct');launchConfetti();
    document.getElementById('poke-card').classList.add('celebrate');
    setTimeout(()=>document.getElementById('poke-card').classList.remove('celebrate'),600);
    showResult(true,pts);
  }else{
    streak=0;document.getElementById('streak-val').textContent=0;
    setStatus(`❌ "${input}" 틀렸어요`,'wrong');
    addHistory('wrong');
    document.getElementById('poke-card').classList.add('shake');
    setTimeout(()=>document.getElementById('poke-card').classList.remove('shake'),480);
    showResult(false);
  }
}

function revealImg(){document.getElementById('poke-img').classList.add('revealed');}
function setStatus(msg,cls){
  const e=document.getElementById('status-msg');
  e.textContent=msg;e.className='status-msg'+(cls?' '+cls:'');
}

// ── Result ──
function showResult(ok,pts=0){
  const OE=['🎉','✨','🌟','🎊','🔥'];
  const WE=['😅','💦','🙈','😢'];
  document.getElementById('r-emoji').textContent=ok?OE[~~(Math.random()*OE.length)]:WE[~~(Math.random()*WE.length)];
  document.getElementById('r-title').textContent=ok?'정답이에요!':'아쉽게도...';
  document.getElementById('r-title').className='result-title '+(ok?'correct':'wrong');
  document.getElementById('r-detail').innerHTML=ok
    ?`<strong>${cur.ko}</strong> 맞아요! 👏`
    :`정답은 <strong>${cur.ko}</strong> (#${String(cur.id).padStart(3,'0')})`;
  document.getElementById('r-pts').textContent=ok?`+${pts}점 획득! (누적 ${score}점)`:'연속 정답 리셋 😢';
  // Show revealed pokemon image in result box
  const ri=document.getElementById('r-img');
  ri.src=cur.sd.sprite;ri.style.display='block';
  document.getElementById('result-overlay').classList.add('show');
}

function nextPokemon(){
  document.getElementById('result-overlay').classList.remove('show');
  loadNext();
}

// ── History ──
function addHistory(type){
  history.push(type);if(history.length>24)history.shift();
  const el=document.getElementById('history-dots');el.innerHTML='';
  history.forEach(h=>{const d=document.createElement('div');d.className=`hdot ${h}`;el.appendChild(d);});
}

// ── Voice (optional, shown only if supported) ──
function setupVoice(SR){
  recog=new SR();recog.lang='ko-KR';recog.continuous=false;recog.interimResults=true;recog.maxAlternatives=8;
  recog.onstart=()=>{
    listening=true;
    const b=document.getElementById('btn-voice');b.classList.add('listening');b.textContent='🔴 듣는 중...';
    setStatus('🎧 말씀하세요...','listening');
  };
  recog.onresult=(e)=>{
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        let best=null;
        for(let j=0;j<e.results[i].length;j++){if(checkAns(e.results[i][j].transcript)){best=e.results[i][j].transcript.trim();break;}}
        if(!best)best=e.results[i][0].transcript.trim();
        stopListening();processAns(best);
      }else{
        setStatus(`💬 "${e.results[i][0].transcript}"...`,'listening');
      }
    }
  };
  recog.onerror=(e)=>{
    stopListening();
    setStatus(e.error==='no-speech'?'소리가 안 들렸어요. 다시 눌러보세요!':'오류가 생겼어요.','');
  };
  recog.onend=()=>stopListening();
}

function toggleVoice(){
  if(answered||!voiceSupported)return;
  if(listening)stopListening();
  else{try{recog.start();}catch(e){}}
}

function stopListening(){
  listening=false;
  const b=document.getElementById('btn-voice');
  if(b){b.classList.remove('listening');b.textContent='🎤 말하기';}
  if(recog){try{recog.stop();}catch(e){}}
}

// ── Confetti ──
function launchConfetti(){
  const cols=['#FFCB05','#E3350D','#3D7DCA','#2ea043','#ff7eb3','#a855f7','#f97316'];
  for(let i=0;i<55;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='conf';
      const sz=5+Math.random()*9;
      el.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.4}s`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
    },i*28);
  }
}

init();
</script>
