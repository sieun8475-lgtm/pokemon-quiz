<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>한글 받아쓰기 동화</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#fef9f0;--card:#fffdf7;
  --orange:#f5813f;--yellow:#f7c948;--green:#5cb85c;
  --blue:#5b9bd5;--red:#e05c5c;--purple:#9b6dd6;
  --brown:#7a5230;--lightbrown:#c8956c;--border:#f0d9b0;
  --text:#4a3520;--sub:#9a7550;--shadow:rgba(120,80,30,.12);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Gaegu',cursive;
  background:var(--cream);color:var(--text);
  min-height:100vh;min-height:-webkit-fill-available;
  overflow-x:hidden;
  padding-bottom:calc(12px + var(--safe-bottom));
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23f7c948' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
}

header{text-align:center;padding:16px 16px 6px;background:linear-gradient(180deg,#fff8e8 0%,transparent 100%);}
.logo{font-family:'Jua',cursive;font-size:clamp(1.6rem,5vw,2.4rem);color:var(--brown);letter-spacing:2px;text-shadow:2px 3px 0 rgba(122,82,48,.15);}

.char-area{text-align:center;padding:4px 0 0;}
.char{font-size:60px;display:inline-block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.1));transition:transform .3s;}
.char.happy{animation:charHappy .6s cubic-bezier(.34,1.56,.64,1);}
.char.sad{animation:charSad .5s ease;}
.char.speaking{animation:charSpeak .4s infinite alternate;}
@keyframes charHappy{0%{transform:scale(1)}50%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
@keyframes charSad{0%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}100%{transform:rotate(0)}}
@keyframes charSpeak{from{transform:scale(1)}to{transform:scale(1.08) translateY(-3px)}}
.speech-bubble{
  display:inline-block;background:white;border:2.5px solid var(--border);
  border-radius:20px;padding:7px 16px;margin:4px 0;
  font-family:'Jua',cursive;font-size:.92rem;color:var(--brown);
  box-shadow:0 3px 10px var(--shadow);position:relative;
}
.speech-bubble::before{content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:var(--border);}
.speech-bubble::after{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:white;}

.stats-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:4px 14px 8px;}
.chip{background:white;border:2.5px solid var(--border);border-radius:50px;padding:5px 14px;font-family:'Jua',cursive;font-size:.9rem;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px var(--shadow);}
.chip.score{border-color:var(--yellow);color:var(--orange);}
.chip.streak{border-color:#b8e6c8;color:var(--green);}
.chip.sticker{border-color:#e8d5ff;color:var(--purple);}

.game-area{max-width:600px;margin:0 auto;padding:0 12px 20px;}
.cat-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.cat-btn{background:white;border:2.5px solid var(--border);color:var(--sub);border-radius:50px;padding:6px 13px;font-family:'Jua',cursive;font-size:.82rem;cursor:pointer;transition:all .2s;touch-action:manipulation;-webkit-appearance:none;box-shadow:0 2px 6px var(--shadow);}
.cat-btn.active{background:var(--orange);border-color:var(--orange);color:white;box-shadow:0 3px 12px rgba(245,129,63,.35);transform:translateY(-1px);}

.sticker-bar{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:4px 0 8px;}
.sticker{font-size:1.5rem;animation:stickerPop .5s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));}
@keyframes stickerPop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.sticker-slot{width:34px;height:34px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--border);}

/* Main card */
.story-card{
  background:var(--card);border:3px solid var(--border);border-radius:28px;
  padding:18px 16px 16px;box-shadow:0 8px 32px var(--shadow),inset 0 1px 0 rgba(255,255,255,.9);
  position:relative;overflow:hidden;
}
.story-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--yellow),var(--orange),var(--purple),var(--blue));border-radius:28px 28px 0 0;}
.story-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(transparent,transparent 27px,rgba(240,217,176,.18) 27px,rgba(240,217,176,.18) 28px);pointer-events:none;border-radius:28px;}

.word-num{font-family:'Jua',cursive;font-size:.8rem;color:var(--lightbrown);text-align:center;margin-bottom:8px;position:relative;z-index:1;}

/* Sentence box */
.sentence-box{
  background:linear-gradient(135deg,#fffbe8,#fff8f0);border:2.5px solid var(--border);
  border-radius:18px;padding:12px 16px;margin-bottom:12px;text-align:center;
  position:relative;z-index:1;box-shadow:inset 0 2px 6px rgba(0,0,0,.04);
  min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.sentence-label{font-size:.75rem;color:var(--lightbrown);margin-bottom:4px;font-family:'Jua',cursive;}
.sentence-text{font-family:'Jua',cursive;font-size:1.25rem;color:var(--brown);line-height:1.5;}
.sentence-text.hidden-text{color:rgba(200,149,108,.35);font-size:1rem;letter-spacing:2px;}
.sentence-text.correct-reveal{color:var(--green);}
.sentence-text.wrong-reveal{color:var(--red);}

/* TTS row */
.tts-row{display:flex;gap:8px;justify-content:center;margin-bottom:10px;position:relative;z-index:1;}
.btn-tts{background:linear-gradient(135deg,var(--blue),#3d7fc4);color:white;font-family:'Jua',cursive;font-size:.92rem;border:none;border-radius:50px;padding:10px 18px;cursor:pointer;box-shadow:0 3px 12px rgba(91,155,213,.3);touch-action:manipulation;-webkit-appearance:none;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-tts:active{transform:scale(.96);}
.btn-tts.playing{animation:speakPulse .6s infinite alternate;}
.btn-follow{background:linear-gradient(135deg,var(--purple),#7a4dc0);color:white;font-family:'Jua',cursive;font-size:.92rem;border:none;border-radius:50px;padding:10px 18px;cursor:pointer;box-shadow:0 3px 12px rgba(155,109,214,.3);touch-action:manipulation;-webkit-appearance:none;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-follow:active{transform:scale(.96);}
.btn-follow.active-follow{background:linear-gradient(135deg,#e05c5c,#c03a3a);}
@keyframes speakPulse{from{box-shadow:0 3px 12px rgba(91,155,213,.3)}to{box-shadow:0 3px 24px rgba(91,155,213,.7),0 0 0 5px rgba(91,155,213,.1)}}

.hint-box{background:#fffbe8;border:2px solid var(--yellow);border-radius:14px;padding:8px 14px;margin-bottom:10px;font-family:'Jua',cursive;font-size:.9rem;color:var(--brown);display:none;position:relative;z-index:1;}
.hint-box.show{display:block;animation:fadeSlide .3s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

.status-msg{text-align:center;font-family:'Jua',cursive;font-size:1rem;min-height:22px;margin-bottom:8px;transition:all .25s;position:relative;z-index:1;}
.status-msg.correct{color:var(--green);}
.status-msg.wrong{color:var(--red);}

/* Mode toggle */
.mode-toggle{display:flex;gap:0;margin-bottom:10px;background:#f5ede0;border-radius:50px;padding:4px;position:relative;z-index:1;}
.mode-btn{flex:1;font-family:'Jua',cursive;font-size:.88rem;border:none;border-radius:50px;padding:8px;cursor:pointer;background:transparent;color:var(--sub);transition:all .2s;touch-action:manipulation;}
.mode-btn.active{background:white;color:var(--orange);box-shadow:0 2px 8px var(--shadow);}

/* Canvas */
.canvas-tools{display:flex;gap:6px;margin-bottom:7px;align-items:center;position:relative;z-index:1;}
.tool-btn{font-family:'Jua',cursive;font-size:.78rem;border:2px solid var(--border);border-radius:10px;padding:5px 10px;cursor:pointer;background:white;color:var(--sub);touch-action:manipulation;-webkit-appearance:none;transition:all .15s;box-shadow:0 1px 4px var(--shadow);}
.tool-btn.erase-on{color:var(--red);border-color:rgba(224,92,92,.5);background:#fff5f5;}
.pen-size{display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--sub);margin-left:auto;}
.pen-size input{width:55px;accent-color:var(--orange);}
.canvas-wrap{border:2.5px solid var(--border);border-radius:16px;overflow:hidden;background:white;margin-bottom:10px;touch-action:none;position:relative;z-index:1;box-shadow:inset 0 2px 8px rgba(0,0,0,.05);background-image:repeating-linear-gradient(transparent,transparent 35px,rgba(240,217,176,.45) 35px,rgba(240,217,176,.45) 36px);background-color:white;}
#draw-canvas{display:block;width:100%;cursor:crosshair;}
.canvas-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Jua',cursive;font-size:1.1rem;color:rgba(122,82,48,.18);pointer-events:none;transition:opacity .3s;}

/* Keyboard */
.answer-input{width:100%;background:white;border:2.5px solid var(--border);border-radius:14px;padding:13px 18px;color:var(--text);font-family:'Jua',cursive;font-size:1.15rem;outline:none;transition:border-color .2s,box-shadow .2s;text-align:center;-webkit-appearance:none;margin-bottom:10px;box-shadow:inset 0 2px 6px rgba(0,0,0,.04);}
.answer-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(245,129,63,.12);}
.answer-input::placeholder{color:#ddd;font-size:1rem;}

/* Buttons */
.btn-submit{width:100%;background:linear-gradient(135deg,var(--orange),#d9621a);color:white;font-family:'Jua',cursive;font-size:1.05rem;border:none;border-radius:14px;padding:13px;cursor:pointer;box-shadow:0 4px 14px rgba(245,129,63,.35);touch-action:manipulation;-webkit-appearance:none;margin-bottom:10px;letter-spacing:1px;transition:all .15s;position:relative;z-index:1;}
.btn-submit:active{transform:scale(.97);}
.self-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;position:relative;z-index:1;}
.btn-self-ok{background:linear-gradient(135deg,var(--green),#3d9150);color:white;font-family:'Jua',cursive;font-size:1rem;border:none;border-radius:14px;padding:13px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;box-shadow:0 3px 12px rgba(92,184,92,.3);}
.btn-self-no{background:linear-gradient(135deg,var(--red),#c03a3a);color:white;font-family:'Jua',cursive;font-size:1rem;border:none;border-radius:14px;padding:13px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;box-shadow:0 3px 12px rgba(224,92,92,.3);}
.btn-self-ok:active,.btn-self-no:active{transform:scale(.96);}

.bottom-row{display:flex;gap:8px;margin-bottom:10px;position:relative;z-index:1;}
.btn-hint-ctrl{flex:1;background:white;border:2.5px solid var(--border);color:var(--sub);font-family:'Jua',cursive;font-size:.88rem;border-radius:12px;padding:10px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;box-shadow:0 2px 6px var(--shadow);transition:all .15s;}
.btn-skip-ctrl{flex:1;background:white;border:2.5px solid var(--border);color:#ccc;font-family:'Jua',cursive;font-size:.88rem;border-radius:12px;padding:10px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;box-shadow:0 2px 6px var(--shadow);transition:all .15s;}
.btn-hint-ctrl:active,.btn-skip-ctrl:active{transform:scale(.96);}

.progress-row{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;}
.pdot{width:13px;height:13px;border-radius:50%;border:2.5px solid var(--border);background:white;transition:all .3s;}
.pdot.correct{background:var(--green);border-color:var(--green);}
.pdot.wrong{background:var(--red);border-color:var(--red);}
.pdot.skip{background:#ddd;border-color:#ddd;}
.pdot.current{background:var(--yellow);border-color:var(--orange);transform:scale(1.3);box-shadow:0 0 0 3px rgba(247,201,72,.3);}

/* Result overlay */
.result-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(74,53,32,.55);backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .3s;padding:16px;}
.result-overlay.show{opacity:1;pointer-events:all;}
.result-box{background:var(--card);border:3px solid var(--border);border-radius:28px;padding:28px 24px;text-align:center;width:100%;max-width:380px;transform:scale(.85);transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 16px 48px var(--shadow);}
.result-overlay.show .result-box{transform:scale(1);}
.result-char{font-size:3.5rem;margin-bottom:6px;}
.result-title{font-family:'Jua',cursive;font-size:1.9rem;margin-bottom:8px;}
.result-title.correct{color:var(--green);}
.result-title.wrong{color:var(--red);}
.result-sentence{font-family:'Jua',cursive;font-size:1.05rem;color:var(--brown);background:#fffbe8;border:2px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:8px;line-height:1.5;}
.result-sticker-new{font-size:2rem;margin-bottom:6px;}
.result-detail{font-size:.9rem;color:var(--sub);margin-bottom:14px;}
.btn-next{width:100%;background:linear-gradient(135deg,var(--orange),#d9621a);color:white;font-family:'Jua',cursive;font-size:1.05rem;border:none;border-radius:14px;padding:13px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;box-shadow:0 4px 14px rgba(245,129,63,.3);}
.btn-next:active{transform:scale(.97);}

/* Complete overlay */
.complete-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(74,53,32,.6);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s;padding:16px;}
.complete-overlay.show{opacity:1;pointer-events:all;}
.complete-box{background:var(--card);border:3px solid var(--border);border-radius:28px;padding:32px 24px;text-align:center;width:100%;max-width:400px;transform:scale(.85);transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 16px 48px var(--shadow);}
.complete-overlay.show .complete-box{transform:scale(1);}
.complete-title{font-family:'Jua',cursive;font-size:2rem;color:var(--orange);margin-bottom:4px;}
.complete-score{font-family:'Jua',cursive;font-size:2.8rem;color:var(--green);margin-bottom:4px;}
.complete-detail{font-size:.92rem;color:var(--sub);margin-bottom:10px;}
.complete-stickers{font-size:1.8rem;letter-spacing:4px;margin-bottom:16px;}
.btn-again{width:100%;background:linear-gradient(135deg,var(--green),#3d9150);color:white;font-family:'Jua',cursive;font-size:1rem;border:none;border-radius:14px;padding:13px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;margin-bottom:8px;box-shadow:0 3px 12px rgba(92,184,92,.3);}
.btn-cat{width:100%;background:white;border:2.5px solid var(--border);color:var(--sub);font-family:'Jua',cursive;font-size:.95rem;border-radius:14px;padding:11px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;}

.conf{position:fixed;top:-20px;z-index:300;pointer-events:none;animation:cffall linear forwards;}
@keyframes cffall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.shake{animation:shake .4s;}
@keyframes shake{20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@media(max-width:380px){.char{font-size:50px;}.sentence-text{font-size:1.05rem;}}
</style>
</head>
<body>

<header>
  <div class="logo">📖 한글 받아쓰기 동화 ✏️</div>
</header>

<div class="char-area">
  <div class="char" id="char">🐻</div>
  <div class="speech-bubble" id="speech-bubble">안녕! 나랑 같이 받아쓰기 해볼까? 🌟</div>
</div>

<div class="stats-bar">
  <div class="chip score">⭐ <span id="score-val">0</span>점</div>
  <div class="chip streak">🔥 <span id="streak-val">0</span>연속</div>
  <div class="chip sticker">🎖️ <span id="sticker-val">0</span>개</div>
</div>

<div class="game-area">
  <div class="cat-row">
    <button class="cat-btn active" data-cat="daily">🌈 일상</button>
    <button class="cat-btn" data-cat="animals">🐾 동물</button>
    <button class="cat-btn" data-cat="family">👨‍👩‍👧 가족</button>
    <button class="cat-btn" data-cat="school">🏫 학교</button>
    <button class="cat-btn" data-cat="nature">🌿 자연</button>
    <button class="cat-btn" data-cat="food">🍱 음식</button>
  </div>

  <div class="sticker-bar" id="sticker-bar"></div>

  <div class="story-card" id="story-card">
    <div class="word-num" id="word-num">1 / 10</div>

    <div class="sentence-box">
      <div class="sentence-label" id="sentence-label">🎧 문장을 듣고 받아써 보세요!</div>
      <div class="sentence-text hidden-text" id="sentence-text">~ ~ ~ ~ ~</div>
    </div>

    <div class="tts-row">
      <button class="btn-tts" id="btn-tts" onclick="speak()">🔊 들어보기</button>
      <button class="btn-follow" id="btn-follow" onclick="toggleFollow()">🎤 따라읽기</button>
    </div>

    <div class="hint-box" id="hint-box"></div>
    <div class="status-msg" id="status-msg">🎧 문장을 듣고 받아써요!</div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-draw" onclick="setMode('draw')">✍️ 손으로 쓰기</button>
      <button class="mode-btn" id="mode-type" onclick="setMode('type')">⌨️ 타이핑</button>
    </div>

    <!-- Draw -->
    <div id="draw-section">
      <div class="canvas-tools">
        <button class="tool-btn" onclick="clearCanvas()">🗑️ 지우기</button>
        <button class="tool-btn" id="erase-btn" onclick="toggleErase()">⬜ 지우개</button>
        <div class="pen-size">굵기<input type="range" id="pen-size" min="3" max="22" value="9"></div>
      </div>
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="draw-canvas"></canvas>
        <div class="canvas-guide" id="canvas-guide">✏️ 여기에 문장을 써요</div>
      </div>
      <button class="btn-submit" id="btn-draw-submit" onclick="submitDraw()">✅ 다 썼어요!</button>
      <div class="self-check-grid" id="self-check-grid" style="display:none">
        <button class="btn-self-ok" onclick="selfCheck(true)">⭕ 맞았어요!</button>
        <button class="btn-self-no" onclick="selfCheck(false)">❌ 틀렸어요</button>
      </div>
    </div>

    <!-- Type -->
    <div id="type-section" style="display:none">
      <input class="answer-input" id="answer-input"
        type="text" inputmode="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="문장을 입력하세요..."
        onkeydown="if(event.key==='Enter'){event.preventDefault();submitType();}">
      <button class="btn-submit" onclick="submitType()">✅ 확인!</button>
    </div>

    <div class="bottom-row">
      <button class="btn-hint-ctrl" id="btn-hint" onclick="showHint()">💡 힌트 1</button>
      <button class="btn-skip-ctrl" onclick="skipSentence()">⏭ 건너뛰기</button>
    </div>

    <div class="progress-row" id="progress-dots"></div>
  </div>
</div>

<!-- Result -->
<div class="result-overlay" id="result-overlay">
  <div class="result-box">
    <div class="result-char" id="r-char">🐻</div>
    <div class="result-title" id="r-title">정답!</div>
    <div class="result-sentence" id="r-sentence"></div>
    <div class="result-sticker-new" id="r-sticker"></div>
    <div class="result-detail" id="r-detail"></div>
    <button class="btn-next" onclick="nextSentence()">다음 문장 →</button>
  </div>
</div>

<!-- Complete -->
<div class="complete-overlay" id="complete-overlay">
  <div class="complete-box">
    <div style="font-size:3.5rem;margin-bottom:6px;">🏆</div>
    <div class="complete-title">다 했어요! 🎉</div>
    <div class="complete-score" id="c-score">0점</div>
    <div class="complete-detail" id="c-detail"></div>
    <div class="complete-stickers" id="c-stickers"></div>
    <button class="btn-again" onclick="startRound()">🔄 다시 하기</button>

const STICKERS=['⭐','🌟','🎖️','🏆','🌈','🎀','💎','🌸','🦋','🍀','🎯','🎠'];
const CHAR_MSGS={
  start:['안녕! 같이 받아쓰기 해볼까? 🌟','오늘도 열심히 써보자! ✏️','잘 할 수 있어! 응원할게! 🎉'],

  wrong:['괜찮아, 다음엔 잘 할 수 있어! 💪','아쉽지만 다시 해보자! 🌈','틀려도 괜찮아, 연습이 중요해! ✨'],

};

// ── State ──
let selCat='daily',sentList=[],curIdx=0,answered=false;
let score=0,streak=0,totalStickers=0,roundResults=[],earnedStickers=[];
let hintLevel=0;
let canvas,ctx,drawing=false,erasing=false,hasDrawn=false;
let drawMode='draw',followMode=false;

// ── Init ──
function init(){
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');selCat=b.dataset.cat;startRound();
    });
  });
  setTimeout(initCanvas,150);
  if('speechSynthesis' in window){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  }
  startRound();
}

// ── Round ──
function startRound(){
  closeComplete();
  const all=[...SENTENCES[selCat]];
  for(let i=all.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  sentList=all.slice(0,10);
  curIdx=0;score=0;streak=0;roundResults=[];earnedStickers=[];
  document.getElementById('score-val').textContent=0;
  document.getElementById('streak-val').textContent=0;
  buildDots();renderStickers();
  setBubble(rand(CHAR_MSGS.start));
  loadSentence();
}

function buildDots(){
  const el=document.getElementById('progress-dots');el.innerHTML='';
  sentList.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i===0?' current':'');
    el.appendChild(d);
  });
}

function updateDots(){
  document.querySelectorAll('.pdot').forEach((d,i)=>{
    d.className='pdot';
    if(i<curIdx) d.classList.add(roundResults[i]==='correct'?'correct':roundResults[i]==='skip'?'skip':'wrong');
    else if(i===curIdx) d.classList.add('current');
  });
}

// ── Load sentence ──
function loadSentence(){
  answered=false;hintLevel=0;

  // Reset UI
  document.getElementById('hint-box').className='hint-box';
  document.getElementById('hint-box').textContent='';
  document.getElementById('btn-hint').textContent='💡 힌트 1';
  document.getElementById('answer-input').value='';
  document.getElementById('word-num').textContent=`${curIdx+1} / ${sentList.length}`;
  document.getElementById('btn-draw-submit').style.display='block';
  document.getElementById('self-check-grid').style.display='none';
  setStatus('🎧 문장을 듣고 받아써요!','');
  followMode=false;updateFollowBtn();

  // 문장 숨기기
  const st=document.getElementById('sentence-text');
  st.className='sentence-text hidden-text';
  st.textContent='~ ~ ~ ~ ~';
  document.getElementById('sentence-label').textContent='🎧 문장을 듣고 받아써 보세요!';

  // Canvas reset
  if(canvas)clearCanvas();
  erasing=false;
  const eb=document.getElementById('erase-btn');
  if(eb){eb.textContent='⬜ 지우개';eb.classList.remove('erase-on');}

  updateDots();
  setTimeout(()=>speak(),400);
}

// ── Reveal sentence after answer ──
function revealSentence(correct){
  const s=sentList[curIdx];
  const st=document.getElementById('sentence-text');
  st.className='sentence-text '+(correct?'correct-reveal':'wrong-reveal');
  st.textContent=s.s;
  document.getElementById('sentence-label').textContent=correct?'✅ 정답이에요!':'❌ 정답은 이거예요!';
}

// ── TTS ──
function speak(){
  if(!('speechSynthesis' in window))return;
  const s=sentList[curIdx];
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(s.s);
  utt.lang='ko-KR';utt.rate=0.82;utt.pitch=1.1;
  const voices=window.speechSynthesis.getVoices();
  const koVoice=voices.find(v=>v.lang.startsWith('ko'));
  if(koVoice)utt.voice=koVoice;
  const btn=document.getElementById('btn-tts');
  btn.classList.add('playing');
  document.getElementById('char').classList.add('speaking');
  utt.onend=()=>{btn.classList.remove('playing');document.getElementById('char').className='char';};
  utt.onerror=()=>{btn.classList.remove('playing');document.getElementById('char').className='char';};
  window.speechSynthesis.speak(utt);
}

function toggleFollow(){
  followMode=!followMode;updateFollowBtn();
  if(followMode){
    setBubble('따라 읽어봐! 천천히 읽어줄게! 🎤');
    setStatus('🎤 문장을 큰 소리로 따라 읽어보세요!','');
    setTimeout(()=>{
      if(!('speechSynthesis' in window))return;
      const s=sentList[curIdx];
      window.speechSynthesis.cancel();
      const utt=new SpeechSynthesisUtterance(s.s);
      utt.lang='ko-KR';utt.rate=0.6;utt.pitch=1.0;
      const voices=window.speechSynthesis.getVoices();
      const koVoice=voices.find(v=>v.lang.startsWith('ko'));
      if(koVoice)utt.voice=koVoice;
      utt.onend=()=>{followMode=false;updateFollowBtn();setStatus('🎧 이제 써볼까요?','');};
      window.speechSynthesis.speak(utt);
    },300);
  }else{
    window.speechSynthesis.cancel();
    setStatus('🎧 문장을 듣고 받아써요!','');
    setBubble(rand(CHAR_MSGS.start));
  }
}
function updateFollowBtn(){
  const btn=document.getElementById('btn-follow');
  btn.textContent=followMode?'⏹ 멈추기':'🎤 따라읽기';
  btn.className=followMode?'btn-follow active-follow':'btn-follow';
}

// ── Canvas ──
function initCanvas(){
  canvas=document.getElementById('draw-canvas');
  const wrap=document.getElementById('canvas-wrap');
  canvas.width=wrap.clientWidth||500;
  canvas.height=180;
  resetCanvas();
  canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();startDraw((t.clientX-r.left)*(canvas.width/r.width),(t.clientY-r.top)*(canvas.height/r.height));},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();doDraw((t.clientX-r.left)*(canvas.width/r.width),(t.clientY-r.top)*(canvas.height/r.height));},{passive:false});
  canvas.addEventListener('touchend',()=>endDraw());
  canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();startDraw(e.clientX-r.left,e.clientY-r.top);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const r=canvas.getBoundingClientRect();doDraw(e.clientX-r.left,e.clientY-r.top);});
  canvas.addEventListener('mouseup',()=>endDraw());
  canvas.addEventListener('mouseleave',()=>endDraw());
}
function resetCanvas(){
  if(!ctx)ctx=canvas.getContext('2d');
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='white';ctx.fillRect(0,0,canvas.width,canvas.height);
  hasDrawn=false;
  const g=document.getElementById('canvas-guide');if(g)g.style.opacity='1';
}
function startDraw(x,y){
  drawing=true;hasDrawn=true;
  const g=document.getElementById('canvas-guide');if(g)g.style.opacity='0';
  ctx.beginPath();ctx.moveTo(x,y);
}
function doDraw(x,y){
  if(!drawing)return;
  ctx.globalCompositeOperation=erasing?'destination-out':'source-over';
  ctx.strokeStyle=erasing?'rgba(255,255,255,1)':'#4a3520';
  ctx.lineWidth=erasing?32:parseInt(document.getElementById('pen-size').value||9);
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);
}
function endDraw(){drawing=false;ctx.beginPath();}
function clearCanvas(){resetCanvas();}
function toggleErase(){
  erasing=!erasing;
  const eb=document.getElementById('erase-btn');
  eb.textContent=erasing?'✏️ 펜':'⬜ 지우개';
  eb.classList.toggle('erase-on',erasing);
}
function setMode(mode){
  drawMode=mode;
  document.getElementById('mode-draw').classList.toggle('active',mode==='draw');
  document.getElementById('mode-type').classList.toggle('active',mode==='type');
  document.getElementById('draw-section').style.display=mode==='draw'?'block':'none';
  document.getElementById('type-section').style.display=mode==='type'?'block':'none';
  if(mode==='type')setTimeout(()=>document.getElementById('answer-input').focus(),100);
}

// ── Submit draw ──
function submitDraw(){
  if(answered)return;
  const s=sentList[curIdx];
  // 정답 공개 후 자가 채점
  revealSentence(true); // 일단 보여주고
  document.getElementById('sentence-label').textContent='✍️ 내가 쓴 것과 비교해 보세요!';
  const stEl=document.getElementById('sentence-text');
  stEl.className='sentence-text';stEl.style.color='#7a5230';
  stEl.textContent=s.s;
  document.getElementById('btn-draw-submit').style.display='none';
  document.getElementById('self-check-grid').style.display='grid';
}

function selfCheck(correct){
  if(answered)return;
  answered=true;
  document.getElementById('self-check-grid').style.display='none';
  document.getElementById('btn-draw-submit').style.display='block';
  revealSentence(correct);
  processResult(correct);
}

// ── Submit type ──
function submitType(){
  if(answered)return;
  const val=document.getElementById('answer-input').value.trim();
  if(!val)return;
  const s=sentList[curIdx];
  const correct=cleanText(val)===cleanText(s.s);
  answered=true;
  revealSentence(correct);
  processResult(correct,val);
}

// 이모지, 마침표, 공백 모두 제거 후 비교
function cleanText(str){
  return str
    .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g,'') // 이모지(서로게이트 쌍)
    .replace(/[\u2600-\u27BF]/g,'')                 // 기타 기호
    .replace(/[.。!！?？,，]/g,'')                   // 문장부호
    .replace(/\s+/g,'')                             // 모든 공백
    .trim();
}

// ── Process result ──
function processResult(correct,typed=''){
  const s=sentList[curIdx];
  roundResults[curIdx]=correct?'correct':'wrong';
  updateDots();

  if(correct){
    const pts=10+(hintLevel===0?5:0)+(streak>=2?streak*2:0);
    score+=pts;streak++;
    document.getElementById('score-val').textContent=score;
    document.getElementById('streak-val').textContent=streak;
    setStatus('✅ 정답이에요!','correct');
    animateChar('happy');setBubble(rand(CHAR_MSGS.correct));
    // 효과음 + 애니메이션
    if(streak>=2) playStreakSound(); else playCorrectSound();
    showCorrectAnimation();
    launchConfetti(streak>=3?80:50);
    if(streak>=2) showStreakBanner(streak);
    const sticker=STICKERS[Math.floor(Math.random()*STICKERS.length)];
    earnedStickers.push(sticker);totalStickers++;
    document.getElementById('sticker-val').textContent=totalStickers;
    renderStickers();
    showResult(true,pts,sticker);
  }else{
    streak=0;document.getElementById('streak-val').textContent=0;
    setStatus('❌ 아쉽게도 틀렸어요!','wrong');
    animateChar('sad');setBubble(rand(CHAR_MSGS.wrong));
    playWrongSound();showWrongAnimation();
    document.getElementById('story-card').classList.add('shake');
    setTimeout(()=>document.getElementById('story-card').classList.remove('shake'),440);
    showResult(false);
  }
}

// ── Hint ──
function showHint(){
  if(answered)return;
  const s=sentList[curIdx];
  const hints=[
    `글자 수: ${s.s.replace(/\s/g,'').replace(/[.!?]/g,'').length}글자예요!`,
    `첫 글자는 <strong style="color:var(--orange);font-size:1.15rem;">${s.s[0]}</strong> 로 시작해요!`,
    `힌트: ${s.h}`,
  ];
  if(hintLevel>=hints.length){document.getElementById('btn-hint').textContent='💡 없음';return;}
  document.getElementById('hint-box').innerHTML='💡 '+hints[hintLevel];
  document.getElementById('hint-box').className='hint-box show';
  hintLevel++;
  document.getElementById('btn-hint').textContent=hintLevel<hints.length?`💡 힌트 ${hintLevel+1}`:'💡 없음';
}

// ── Skip ──
function skipSentence(){
  if(answered)return;
  answered=true;streak=0;document.getElementById('streak-val').textContent=0;
  roundResults[curIdx]='skip';updateDots();
  revealSentence(false);
  setStatus('⏭ 건너뛰었어요!','');
  setBubble(rand(CHAR_MSGS.skip));
  setTimeout(()=>{
    if(curIdx<sentList.length-1){curIdx++;loadSentence();}
    else showComplete();
  },1500);
}

// ── Result overlay ──
function showResult(correct,pts=0,sticker=''){
  const s=sentList[curIdx];
  const OE=['🎉','✨','🌟','🎊','🔥'],WE=['😅','💦','🙈','😢'];
  document.getElementById('r-char').textContent=correct?'🐻':'🐻';
  document.getElementById('r-title').textContent=correct?'정답이에요! 🎉':'아쉽게도...';
  document.getElementById('r-title').className='result-title '+(correct?'correct':'wrong');
  document.getElementById('r-sentence').textContent=s.s;
  document.getElementById('r-sticker').textContent=correct?`스티커 획득! ${sticker}`:'';
  document.getElementById('r-detail').textContent=correct?`+${pts}점 획득! (누적 ${score}점)`:`정답: ${s.s}`;
  document.getElementById('result-overlay').classList.add('show');
}

function nextSentence(){
  document.getElementById('result-overlay').classList.remove('show');
  if(curIdx<sentList.length-1){curIdx++;loadSentence();}
  else showComplete();
}

// ── Complete ──
function showComplete(){
  const correct=roundResults.filter(r=>r==='correct').length;
  const total=sentList.length;
  const pct=Math.round(correct/total*100);
  document.getElementById('c-score').textContent=score+'점';
  document.getElementById('c-detail').textContent=`${total}문제 중 ${correct}개 정답! (${pct}%)`;
  document.getElementById('c-stickers').textContent=earnedStickers.join('');
  setBubble(rand(CHAR_MSGS.complete));
  animateChar('happy');
  playCompleteSound();
  document.getElementById('complete-overlay').classList.add('show');
  launchConfetti(80);
}
function closeComplete(){document.getElementById('complete-overlay').classList.remove('show');}

// ── Sticker bar ──
function renderStickers(){
  const bar=document.getElementById('sticker-bar');bar.innerHTML='';
  const shown=earnedStickers.slice(-8);
  shown.forEach(s=>{const d=document.createElement('div');d.className='sticker';d.textContent=s;bar.appendChild(d);});
  for(let i=0;i<Math.max(0,5-shown.length);i++){const d=document.createElement('div');d.className='sticker-slot';d.textContent='✦';bar.appendChild(d);}
}

// ── Helpers ──
function animateChar(type){
  const el=document.getElementById('char');
  el.className='char';
  setTimeout(()=>el.classList.add(type),10);
  setTimeout(()=>el.className='char',700);
}
function setBubble(msg){document.getElementById('speech-bubble').textContent=msg;}
function setStatus(msg,cls){
  const e=document.getElementById('status-msg');
  e.textContent=msg;e.className='status-msg'+(cls?' '+cls:'');
}
function rand(arr){return arr[~~(Math.random()*arr.length)];}

// ── 효과음 (Web Audio API) ──
function getAudioCtx(){
  if(!window._audioCtx) window._audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return window._audioCtx;
}

function playCorrectSound(){
  try{
    const ctx=getAudioCtx();
    // 밝고 신나는 상승 멜로디
    const notes=[523,659,784,1047]; // C5 E5 G5 C6
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.1);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.1);
      gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+i*0.1+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.25);
      osc.start(ctx.currentTime+i*0.1);
      osc.stop(ctx.currentTime+i*0.1+0.25);
    });
  }catch(e){}
}

function playStreakSound(){
  try{
    const ctx=getAudioCtx();
    // 더 화려한 연속 정답 멜로디
    const notes=[523,659,784,1047,1319];
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='triangle';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.08);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.08);
      gain.gain.linearRampToValueAtTime(0.35,ctx.currentTime+i*0.08+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.08+0.2);
      osc.start(ctx.currentTime+i*0.08);
      osc.stop(ctx.currentTime+i*0.08+0.2);
    });
  }catch(e){}
}

function playWrongSound(){
  try{
    const ctx=getAudioCtx();
    // 낮고 부드러운 실패음
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(330,ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(220,ctx.currentTime+0.3);
    gain.gain.setValueAtTime(0.2,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
  }catch(e){}
}

function playCompleteSound(){
  try{
    const ctx=getAudioCtx();
    // 완료 팡파레
    const melody=[523,523,523,392,523,659,784];
    const durations=[0.1,0.1,0.1,0.15,0.1,0.1,0.4];
    let t=ctx.currentTime;
    melody.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='square';osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.15,t);
      gain.gain.exponentialRampToValueAtTime(0.001,t+durations[i]);
      osc.start(t);osc.stop(t+durations[i]+0.05);
      t+=durations[i];
    });
  }catch(e){}
}

// ── 정답 축하 애니메이션 ──
function showCorrectAnimation(){
  // 화면 번쩍임
  const flash=document.createElement('div');
  flash.style.cssText='position:fixed;inset:0;background:rgba(255,215,0,.25);z-index:500;pointer-events:none;animation:flashAnim .4s ease-out forwards;border-radius:0;';
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),500);

  // 큰 이모지 팝업
  const emojis=['⭐','🌟','✨','🎉','🎊','💫'];
  for(let i=0;i<6;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.textContent=emojis[~~(Math.random()*emojis.length)];

      const y=20+Math.random()*60;
      el.style.cssText=`position:fixed;left:${x}vw;top:${y}vh;font-size:${2+Math.random()*2}rem;z-index:400;pointer-events:none;animation:emojiPop .8s cubic-bezier(.34,1.56,.64,1) forwards;`;

// ── 연속 정답 배너 ──
function showStreakBanner(count){
  const existing=document.getElementById('streak-banner');
  if(existing)existing.remove();
  const banner=document.createElement('div');
  banner.id='streak-banner';
  const msgs={2:'2연속! 🔥',3:'3연속! 🔥🔥',4:'4연속! 🔥🔥🔥',5:'5연속!! 🌟🌟🌟'};
  const msg=msgs[count]||(count+'연속!! 🏆🏆🏆');
  banner.style.cssText=`
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#f7c948,#f5813f);
    color:white;font-family:'Jua',cursive;font-size:1.3rem;
    padding:12px 28px;border-radius:50px;z-index:600;

  `;
  banner.textContent=msg;

  setTimeout(()=>banner.remove(),2000);
}

function launchConfetti(count=50){
  const cols=['#f7c948','#f5813f','#5cb85c','#5b9bd5','#9b6dd6','#e05c5c','#ff7eb3'];
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='conf';
      const sz=5+Math.random()*9;
      el.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
    },i*30);
  }
}
